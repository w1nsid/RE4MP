name: Build RE4MP

on:
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows (DLL + Injector + Server)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build RE4MP.dll
        run: |
          cl.exe /nologo /EHsc /W3 /O2 /D "WIN32" /D "NDEBUG" /D "_CONSOLE" /D "_WINDLL" /I "RE4MP" ^
            /Fo"build\\" ^
            RE4MP\RE4MP.cpp RE4MP\detours.cpp ^
            /link /DLL /OUT:"build\RE4MP.dll" ^
            "RE4MP\lib\detours.lib" ws2_32.lib kernel32.lib user32.lib advapi32.lib
        shell: cmd

      - name: Build RE4MPInjector.exe
        run: |
          cl.exe /nologo /EHsc /W3 /O2 /D "WIN32" /D "NDEBUG" /D "_CONSOLE" ^
            /Fo"build\\" ^
            RE4MPInjector\RE4MPInjector.cpp ^
            /link /OUT:"build\RE4MPInjector.exe" ^
            kernel32.lib user32.lib advapi32.lib
        shell: cmd

      - name: Build RE4MPServer.exe
        run: |
          cl.exe /nologo /O2 /W3 /D "WIN32" ^
            /Fo"build\\" ^
            RE4MPServer\re4mp_server.c ^
            /link /OUT:"build\RE4MPServer.exe" ^
            ws2_32.lib
        shell: cmd

      - name: Copy config
        run: copy re4mp.ini build\re4mp.ini
        shell: cmd

      - name: Package client zip
        run: Compress-Archive -Path build\RE4MP.dll, build\RE4MPInjector.exe, build\re4mp.ini -DestinationPath build\RE4MP-client.zip
        shell: pwsh

      - name: Upload client zip
        uses: actions/upload-artifact@v4
        with:
          name: RE4MP-client-windows
          path: build/RE4MP-client.zip

      - name: Upload server exe
        uses: actions/upload-artifact@v4
        with:
          name: RE4MP-server-windows
          path: build/RE4MPServer.exe

  build-linux-server:
    name: Build Linux Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build re4mp-server
        run: |
          cd RE4MPServer
          make

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: RE4MP-server-linux
          path: RE4MPServer/re4mp-server
