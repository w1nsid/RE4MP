; RE4MP Configuration
; Place this file next to RE4MP.dll
;
; ServerIP: The dedicated server's IP address or hostname
;           e.g. 203.0.113.5, re4mp.example.com, or a LAN IP
;
; ServerPort: UDP port the server is listening on (default 27015)
;
; HostMode: 1 = Host (authoritative for enemy/boss sync)
;           0 = Client (receives enemy/boss state from host)
;           One player must be Host and the other Client.

[RE4MP]
ServerIP=127.0.0.1
ServerPort=27015
HostMode=1
